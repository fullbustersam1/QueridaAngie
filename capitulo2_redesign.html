<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Noche Estrellada - Camino de Estrellas</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050b1d;
            --star-color: #fffce0;
            --hilo-rojo: #ff1e56;
            --hilo-glow: #ff4d6d;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            background-color: var(--bg-color); font-family: 'Inter', sans-serif;
            user-select: none;
        }

        /* Fondo */
        .background-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(5, 11, 29, 0.7), rgba(5, 11, 29, 0.7)), url('img/nocheestrellada.jpg');
            background-size: cover; background-position: center; z-index: -2;
        }

        .sky-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, transparent 20%, rgba(5, 11, 29, 0.9) 100%); z-index: -1;
        }

        canvas { position: absolute; top: 0; left: 0; display: block; z-index: 5; touch-action: none; cursor: pointer; }

        .ui-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10;
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            padding: 5vh 20px; box-sizing: border-box;
        }

        .instruction-text {
            color: #fff; font-family: 'Great Vibes', cursive; font-size: clamp(1.8rem, 5vw, 2.8rem);
            text-align: center; text-shadow: 0 0 15px rgba(255, 255, 255, 0.8), 0 0 5px #000;
            opacity: 1; margin: 0; max-width: 900px; animation: floatText 4s ease-in-out infinite; transition: opacity 0.5s;
        }

        @keyframes floatText { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* Modal de Recuerdos */
        .memory-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(8px);
            display: flex; align-items: center; justify-content: center;
            z-index: 100; opacity: 0; visibility: hidden; transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .memory-modal.show { opacity: 1; visibility: visible; }

        .memory-card {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px; border-radius: 20px; max-width: 450px; width: 90%; text-align: center;
            transform: scale(0.8) translateY(20px); transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .memory-modal.show .memory-card { transform: scale(1) translateY(0); }

        .memory-img {
            width: 100%; aspect-ratio: 4/3; object-fit: cover; border-radius: 12px;
            border: 2px solid rgba(255, 255, 255, 0.2); margin-bottom: 20px;
        }

        .memory-text {
            color: #fff; font-family: 'Gloria Hallelujah', cursive; font-size: 1.2rem;
            line-height: 1.5; margin-bottom: 25px; text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .continue-btn {
            background: linear-gradient(45deg, var(--hilo-rojo), #ff4d6d); color: white;
            border: none; padding: 15px 40px; font-size: 1.1rem; font-weight: 700;
            border-radius: 50px; cursor: pointer; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-family: 'Inter', sans-serif;
        }

        .continue-btn:hover { transform: scale(1.1); box-shadow: 0 10px 30px rgba(255, 30, 86, 0.5); }

        .victory-container { text-align: center; display: none; }
        .victory-container.show { display: block; }
        .victory-message {
            color: #fff; font-family: 'Great Vibes', cursive; font-size: clamp(2rem, 6vw, 3.2rem);
            margin-bottom: 40px; text-shadow: 0 0 20px var(--hilo-rojo); line-height: 1.3;
        }
    </style>
</head>
<body>
    <div class="background-container"></div>
    <div class="sky-overlay"></div>
    <canvas id="starCanvas"></canvas>

    <div class="ui-container">
        <h1 class="instruction-text">
            Las constelaciones nos guiaron el primer día.<br>
            Toca el corazón inicial para revivir nuestro viaje.
        </h1>

        <div id="victoryContainer" class="victory-container">
            <h2 class="victory-message">
                Nuestras coordenadas nunca se perdieron por completo,<br>
                el hilo rojo siempre estuvo ahí.
            </h2>
            <button class="continue-btn" onclick="alert('✨ El hilo rojo siempre estuvo ahí.')">Continuar viaje</button>
        </div>
    </div>

    <!-- Modal de Memoria -->
    <div id="memoryModal" class="memory-modal">
        <div class="memory-card">
            <img id="memoryImg" src="" class="memory-img">
            <p id="memoryText" class="memory-text"></p>
            <button class="continue-btn" onclick="resumeConnection()">Sigue el viaje</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        const victoryContainer = document.getElementById('victoryContainer');
        const instruction = document.querySelector('.instruction-text');
        const memoryModal = document.getElementById('memoryModal');
        const memoryImg = document.getElementById('memoryImg');
        const memoryText = document.getElementById('memoryText');

        let width, height;
        let stars = [];
        let interactiveStars = [];
        let connectedCount = 0;
        let isVictory = false;
        let isAnimating = false;
        let ripples = [];
        let autoTimer;

        // 12 PUNTOS DEL CORAZÓN (Balanceado: Ni muy delgado ni muy ancho)
        function generateHeartPath() {
            return [
                { x: 50, y: 95 }, // 1: Punta inferior
                { x: 25, y: 80 }, // 2
                { x: 8,  y: 55 }, // 3: MEMORIA 1
                { x: 4,  y: 30 }, // 4: Punto más ancho IZQ
                { x: 12, y: 10 }, // 5: Pico superior IZQ
                { x: 32, y: 6 },  // 6: Curva superior IZQ (MEMORIA 2)
                { x: 50, y: 28 }, // 7: Muesca centro
                { x: 68, y: 6 },  // 8: Curva superior DER
                { x: 88, y: 10 }, // 9: Pico superior DER (MEMORIA 3)
                { x: 96, y: 30 }, // 10: Punto más ancho DER
                { x: 92, y: 55 }, // 11
                { x: 75, y: 80 }, // 12
                { x: 50, y: 95 }  // Cierre (MEMORIA 4 / VICTORY)
            ];
        }

        const memories = [
            { img: 'img/capitulo2/image2.jpeg', text: "¿Recuerdas que quería que fueras mi novia desde el 11 de abril? ❤️" },
            { img: 'img/capitulo2/image4.jpeg', text: "Descubrí ese lado detallista que no sabía que existía en mí por ti. ✨" },
            { img: 'img/capitulo2/image3.jpeg', text: "Cuando me diste el sí, ¡quería gritarlo por todo el mall! 💍" },
            { img: 'img/capitulo2/image1.jpeg', text: "Incluso con el agua hasta los tobillos, éramos felices. 😂🌊" }
        ];

        const heartPath = generateHeartPath();

        class Ripple {
            constructor(x, y, color = "rgba(255, 255, 255, 1)") {
                this.x = x; this.y = y; this.size = 2; this.opacity = 1; this.color = color;
            }
            update() { this.size += 5; this.opacity -= 0.04; }
            draw() {
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.strokeStyle = this.color.replace("1)", `${this.opacity})`);
                ctx.lineWidth = 3; ctx.stroke();
            }
        }

        class Star {
            constructor(isInteractive, tx, ty, index) {
                this.isInteractive = isInteractive; this.index = index; this.tx = tx; this.ty = ty;
                this.reset();
            }
            reset() {
                if (this.isInteractive) {
                    const sizeBase = Math.min(width, height);
                    
                    // ESCALADO BALANCEADO: Un punto medio elegante
                    const hW = sizeBase * (width < 600 ? 0.88 : 0.72); 
                    const hH = sizeBase * (width < 600 ? 0.76 : 0.68);
                    
                    const offsetX = (width - hW) / 2;
                    const offsetY = (height - hH) / 2 + (width < 600 ? 25 : 65);

                    this.x = (this.tx / 100) * hW + offsetX;
                    this.y = (this.ty / 100) * hH + offsetY;
                    
                    this.size = width < 700 ? 10 : 13;
                    this.connected = false;
                } else {
                    this.x = Math.random()*width; this.y = Math.random()*height; this.size = Math.random()*2;
                }
                this.opacity = Math.random(); this.blinkSpeed = 0.01 + Math.random()*0.02; this.pulse = 0;
            }
            update() {
                this.opacity += this.blinkSpeed;
                if (this.opacity > 1 || this.opacity < 0.3) this.blinkSpeed *= -1;
                this.pulse += 0.08;
            }
            draw() {
                if (this.isInteractive) {
                    const isTarget = (this.index === connectedCount && !isAnimating && !isVictory);
                    if (isTarget) {
                        ctx.beginPath(); ctx.arc(this.x, this.y, this.size * (2 + Math.sin(this.pulse)*0.4), 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(255, 255, 255, 0.15)`; ctx.fill();
                    }
                    ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = (this.connected || (isAnimating && this.index <= connectedCount)) ? '#fffce0' : (isTarget ? '#ffffff' : `rgba(255, 252, 224, ${this.opacity})`);
                    ctx.shadowBlur = (this.connected || isTarget || isAnimating) ? 25 : 0; ctx.shadowColor = '#ffffff';
                    ctx.fill(); ctx.shadowBlur = 0;

                    if (!this.connected && !isVictory && this.index === 0 && !isAnimating) {
                        ctx.font = `bold ${width < 700 ? '16px' : '20px'} Inter`; ctx.fillStyle = "#ffffff"; ctx.textAlign = "center";
                        ctx.fillText("Toca aquí", this.x, this.y + 40);
                    }
                } else {
                    ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 252, 224, ${this.opacity})`; ctx.fill();
                }
            }
        }

        function init() {
            resize();
            stars = Array.from({length: 120}, () => new Star(false));
            interactiveStars = heartPath.map((p, i) => new Star(true, p.x, p.y, i));
            animate();
        }

        function resize() {
            width = window.innerWidth; height = window.innerHeight;
            canvas.width = width; canvas.height = height;
            interactiveStars.forEach(s => s.reset());
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            if (!isVictory) {
                ctx.beginPath(); ctx.moveTo(interactiveStars[0].x, interactiveStars[0].y);
                for (let i = 1; i < interactiveStars.length; i++) ctx.lineTo(interactiveStars[i].x, interactiveStars[i].y);
                ctx.strokeStyle = "rgba(255, 255, 255, 0.08)"; ctx.setLineDash([5, 5]); ctx.stroke(); ctx.setLineDash([]);
            }
            stars.forEach(s => { s.update(); s.draw(); });
            if (connectedCount > 0) {
                ctx.beginPath(); ctx.moveTo(interactiveStars[0].x, interactiveStars[0].y);
                ctx.lineWidth = width < 700 ? 5 : 8; ctx.strokeStyle = '#ff1e56'; ctx.shadowBlur = 30; ctx.shadowColor = '#ff4d6d';
                ctx.lineCap = 'round'; ctx.lineJoin = 'round';
                const limit = Math.min(connectedCount, interactiveStars.length - 1);
                for (let i = 1; i <= limit; i++) ctx.lineTo(interactiveStars[i].x, interactiveStars[i].y);
                ctx.stroke(); ctx.shadowBlur = 0;
            }
            interactiveStars.forEach(s => { s.update(); s.draw(); });
            ripples.forEach((r, i) => { r.update(); r.draw(); if (r.opacity <= 0) ripples.splice(i, 1); });
            requestAnimationFrame(animate);
        }

        function handleInput(ex, ey) {
            if (isVictory || isAnimating) return;
            const startStar = interactiveStars[0];
            const dist = Math.hypot(ex - startStar.x, ey - startStar.y);
            if (dist < 100) startAutoConnection();
            ripples.push(new Ripple(ex, ey));
        }

        function startAutoConnection() {
            if (isAnimating) return;
            isAnimating = true;
            instruction.style.opacity = "0";
            runAutoStep();
        }

        function runAutoStep() {
            if (connectedCount >= interactiveStars.length - 1) {
                showMemory(3); // Ultimo recuerdo
                return;
            }

            autoTimer = setInterval(() => {
                connectedCount++;
                interactiveStars[connectedCount].connected = true;
                ripples.push(new Ripple(interactiveStars[connectedCount].x, interactiveStars[connectedCount].y, "rgba(255, 30, 86, 1)"));

                // Mostrar recuerdo cada 3 estrellas (3, 6, 9)
                // Usamos connectedCount: 2 (Star 3), 5 (Star 6), 8 (Star 9)
                if (connectedCount === 2) { pauseAndShowMemory(0); }
                else if (connectedCount === 5) { pauseAndShowMemory(1); }
                else if (connectedCount === 8) { pauseAndShowMemory(2); }
                
                if (connectedCount >= interactiveStars.length - 1) {
                    clearInterval(autoTimer);
                    showMemory(3);
                }
            }, 600);
        }

        function pauseAndShowMemory(idx) {
            clearInterval(autoTimer);
            setTimeout(() => { showMemory(idx); }, 500);
        }

        function showMemory(idx) {
            const memory = memories[idx];
            memoryImg.src = memory.img;
            memoryText.innerText = memory.text;
            memoryModal.classList.add('show');
        }

        function resumeConnection() {
            memoryModal.classList.remove('show');
            if (connectedCount >= interactiveStars.length - 1) {
                triggerVictory();
            } else {
                setTimeout(runAutoStep, 400);
            }
        }

        function triggerVictory() {
            isVictory = true; isAnimating = false;
            setTimeout(() => { victoryContainer.classList.add('show'); }, 500);
        }

        window.addEventListener('resize', resize);
        window.addEventListener('pointerdown', (e) => { if (e.target === canvas) handleInput(e.clientX, e.clientY); });
        canvas.addEventListener('touchstart', (e) => e.preventDefault(), { passive: false });
        init();
    </script>
</body>
</html>
