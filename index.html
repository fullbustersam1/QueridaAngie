<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Acceso - Querida Angie</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Lora:ital,wght@0,400;0,500;1,400;1,500&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap"
        rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        body {
            background: radial-gradient(circle at center, #FFF0F5 0%, #E8D3D8 100%);
            color: #5C4048;
            font-family: 'Lora', serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Decoraciones flotantes de fondo */
        .decoration {
            position: absolute;
            font-size: 1.5rem;
            color: #D49BAF;
            opacity: 0.3;
            animation: float 6s ease-in-out infinite;
            z-index: 0;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0) rotate(0deg);
            }

            50% {
                transform: translateY(-20px) rotate(10deg);
            }
        }

        #login-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .login-card {
            background-color: #FFF5F6;
            background-image:
                radial-gradient(circle at 100% 50%, transparent 20%, rgba(220, 180, 190, 0.05) 21%, rgba(220, 180, 190, 0.05) 34%, transparent 35%, transparent),
                radial-gradient(circle at 0% 50%, transparent 20%, rgba(220, 180, 190, 0.05) 21%, rgba(220, 180, 190, 0.05) 34%, transparent 35%, transparent);
            background-size: 10px 10px;
            padding: 50px 40px;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(120, 80, 90, 0.15), inset 0 0 0 1px rgba(212, 175, 55, 0.3), inset 0 0 20px rgba(212, 175, 55, 0.1);
            text-align: center;
            max-width: 380px;
            width: 90%;
            position: relative;
            animation: popIn 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            border-top: 5px solid #D49BAF;
        }

        .ornament {
            margin-bottom: 20px;
            color: #DDA7B0;
        }

        .ornament svg {
            width: 80px;
            height: auto;
        }

        .login-card h2 {
            font-family: 'Great Vibes', cursive;
            color: #8b3a3a;
            margin-top: 0;
            margin-bottom: 5px;
            font-size: 3rem;
            font-weight: normal;
        }

        .login-card p {
            color: #785A63;
            font-size: 1.05rem;
            margin-bottom: 30px;
            line-height: 1.5;
            font-style: italic;
            padding: 0 10px;
        }

        .input-group {
            position: relative;
            margin-bottom: 25px;
            width: 100%;
            display: flex;
            align-items: center;
        }

        .login-card input {
            width: 100%;
            box-sizing: border-box;
            padding: 16px 60px 16px 20px;
            border: 1px solid #E8B4C8;
            border-radius: 30px;
            font-size: 1.05rem;
            font-family: 'Lora', serif;
            text-align: left;
            color: #5C4048;
            background: rgba(255, 255, 255, 0.8);
            outline: none;
            transition: all 0.3s;
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.03);
        }

        .login-card input::placeholder {
            color: #B8828F;
            font-style: italic;
        }

        .login-card input:focus {
            border-color: #D49BAF;
            background: white;
            box-shadow: 0 0 15px rgba(212, 155, 175, 0.4);
        }

        .btn-login-circle {
            position: absolute;
            right: 5px;
            background: linear-gradient(to bottom, #D49BAF, #C17C95);
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 10px rgba(193, 124, 149, 0.3);
            z-index: 5;
        }

        .btn-login-circle:hover {
            transform: scale(1.1) rotate(5deg);
            background: linear-gradient(to bottom, #C17C95, #A5647A);
            box-shadow: 0 6px 15px rgba(193, 124, 149, 0.5);
        }

        .btn-login-circle:active {
            transform: scale(0.95);
        }

        .btn-login-circle i {
            font-size: 1.2rem;
        }

        .btn-secondary {
            background: linear-gradient(135deg, #a855f7 0%, #8b5cf6 100%) !important;
            border: none !important;
            color: white !important;
            padding: 12px 30px;
            font-size: 0.95rem;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%;
            font-family: 'Lora', serif;
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
            font-weight: 500;
        }

        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.4);
            filter: brightness(1.1);
        }

        #error-msg {
            color: #c62828;
            font-size: 0.95rem;
            margin-top: 20px;
            display: none;
            font-weight: 600;
            animation: shake 0.4s ease-in-out;
            background: #ffebee;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ffcdd2;
        }

        @keyframes popIn {
            0% {
                transform: scale(0.9) translateY(20px);
                opacity: 0;
            }

            100% {
                transform: scale(1) translateY(0);
                opacity: 1;
            }
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-5px);
            }

            75% {
                transform: translateX(5px);
            }
        }
    </style>
</head>

<body>
    <!-- Decoraciones flotantes de fondo -->
    <i class="fas fa-heart decoration" style="top: 15%; left: 10%; animation-delay: 0s;"></i>
    <i class="fas fa-feather-alt decoration" style="top: 20%; right: 15%; font-size: 2rem; animation-delay: 1s;"></i>
    <i class="fas fa-star decoration" style="bottom: 20%; left: 15%; font-size: 1.2rem; animation-delay: 2s;"></i>
    <i class="fas fa-heart decoration" style="bottom: 15%; right: 10%; animation-delay: 1.5s;"></i>

    <div id="login-container">
        <div class="login-card">
            <div class="ornament">
                <svg viewBox="0 0 200 20" fill="currentColor">
                    <path d="M0,10 Q50,0 100,10 T200,10" fill="none" stroke="currentColor" stroke-width="1.5" />
                    <circle cx="100" cy="10" r="4" />
                    <circle cx="85" cy="10" r="2" />
                    <circle cx="115" cy="10" r="2" />
                    <polygon points="100,2 103,10 100,18 97,10" fill="currentColor" />
                </svg>
            </div>

            <h2>Contenido Bloqueado</h2>
            <p>Para descubrir el contenido de esta sorpresa, por favor se requiere una palabra secreta.</p>

            <div class="input-group">
                <input type="password" id="pass-input" placeholder="Palabra secreta..." autocomplete="off">
                <button id="btn-login" class="btn-login-circle" title="Ingresar">
                    <i class="fas fa-arrow-right"></i>
                </button>
            </div>

            <button class="btn-secondary" onclick="window.location.href='ahorcado.html'">
                Descubrir contraseña 🕵️‍♀️🔎
            </button>

            <p id="error-msg"><i class="fas fa-exclamation-circle"></i> Contraseña incorrecta. Inténtalo de nuevo.</p>
        </div>
    </div>

    <script>
        const btnLogin = document.getElementById('btn-login');
        const inputPass = document.getElementById('pass-input');

        inputPass.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') verificarLogin();
        });

        btnLogin.addEventListener('click', verificarLogin);

        function verificarLogin() {
            const password = inputPass.value.trim().toUpperCase();
            if (['TUSGAFITAS', 'AMORBONITO', 'QUINCEABRIL'].includes(password)) {
                // Guarda la sesión válida
                sessionStorage.setItem('authKey', 'authed_user_angie');

                // Efecto de carga visual
                btnLogin.innerHTML = 'Abriendo... <i class="fas fa-spinner fa-spin"></i>';
                btnLogin.style.pointerEvents = 'none';

                setTimeout(() => {
                    window.location.href = 'portada.html';
                }, 600);
            } else {
                const errorMsg = document.getElementById('error-msg');
                errorMsg.style.display = 'block';
                // Trigger animation reflow
                errorMsg.style.animation = 'none';
                void errorMsg.offsetWidth;
                errorMsg.style.animation = 'shake 0.4s ease-in-out';
                inputPass.value = '';
            }
        }
    </script>
</body>

</html>
