<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Las coordenadas de un amor que perdí</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Lora:ital,wght@0,400;0,500;1,400;1,500&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap"
        rel="stylesheet">

    <script>
        // Check auth antes de mostrar la página
        if (sessionStorage.getItem('authKey') !== 'authed_user_angie') {
            window.location.href = 'index.html';
        }

        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'serif-title': ['"Playfair Display"', 'serif'],
                        'script': ['"Great Vibes"', 'cursive'],
                        'body': ['"Lora"', 'serif'],
                    },
                    colors: {
                        'paper': '#FFF5F6',
                        'paper-dark': '#FCE4E8',
                        'cover-red': '#D49BAF',
                        'cover-red-light': '#E8B4C8',
                        'cover-red-deep': '#B0657B',
                        'gold': '#DDA7B0',
                        'gold-light': '#F8DAE2',
                        'gold-dark': '#B8828F',
                        'ink': '#5C4048'
                    },
                    boxShadow: {
                        'book-cover': '15px 25px 40px rgba(120,80,90,0.15), inset -2px 0 5px rgba(0,0,0,0.1)',
                        'book-pages': '2px 0 0 #fff, 3px 0 0 #FCE4E8, 5px 0 0 #fff, 6px 0 0 #FCE4E8, 8px 0 0 #fff, 9px 0 0 #F8D8DD, inset 10px 0 20px rgba(0,0,0,0.03)',
                    }
                }
            }
        }
    </script>
    <style>
        /* Fondo inmersivo pastel */
        body {
            background: radial-gradient(circle at center, #FFF0F5 0%, #E8D3D8 100%);
        }

        /* Animaciones suaves */
        .fade-in {
            animation: fadeIn 1.5s ease-out forwards;
            opacity: 0;
            transform: translateY(10px) scale(0.98);
        }

        .delay-1 {
            animation-delay: 0.4s;
        }

        .delay-2 {
            animation-delay: 0.8s;
        }

        .delay-3 {
            animation-delay: 1.2s;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Textura de cuero para la cubierta */
        .leather-texture {
            background-color: #D49BAF;
            background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.4' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='40' height='40' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");
        }

        /* Textura de papel antiguo */
        .paper-texture {
            background-color: #FFF5F6;
            background-image:
                radial-gradient(circle at 100% 50%, transparent 20%, rgba(220, 180, 190, 0.05) 21%, rgba(220, 180, 190, 0.05) 34%, transparent 35%, transparent),
                radial-gradient(circle at 0% 50%, transparent 20%, rgba(220, 180, 190, 0.05) 21%, rgba(220, 180, 190, 0.05) 34%, transparent 35%, transparent);
            background-size: 10px 10px;
        }

        .gold-gradient {
            background: linear-gradient(135deg, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .gold-border-gradient {
            border-image: linear-gradient(135deg, #BF953F, #FCF6BA, #B38728) 1;
        }

        .ribbon-tip {
            clip-path: polygon(0 0, 100% 0, 100% 100%, 50% 85%, 0 100%);
        }

        /* Nueva animación de flotación */
        .book-float {
            animation: floatBook 4s ease-in-out infinite;
        }

        @keyframes floatBook {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        /* Estilo para el cursor de escritura */
        .typewriter-cursor::after {
            content: '|';
            animation: blink 0.8s infinite;
            color: #D49BAF;
            font-weight: bold;
            margin-left: 2px;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }

        .typewriter-done::after {
            display: none;
        }

        /* Ocultar el botón inicialmente */
        #btn-continuar {
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s ease-in;
        }

        #btn-continuar.show {
            opacity: 1;
            pointer-events: auto;
            animation: pulse-button 2s infinite;
        }

        @keyframes pulse-button {
            0% { box-shadow: 0 5px 15px rgba(176, 101, 123, 0.4); }
            50% { box-shadow: 0 5px 25px rgba(176, 101, 123, 0.7); }
            100% { box-shadow: 0 5px 15px rgba(176, 101, 123, 0.4); }
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4 md:p-8 selection:bg-gold selection:text-ink">

    <!-- Contenedor Base con Fade-in para evitar conflictos de animación -->

        <!-- Contenedor del Libro con animación de flotación -->

            class="relative w-full leather-texture rounded-r-2xl shadow-book-cover p-1.5 md:p-2 pr-4 md:pr-6 border border-cover-red transition-transform duration-700 book-float">

                class="absolute -bottom-8 right-16 w-8 h-20 bg-gradient-to-b from-[#E8B4C8] to-[#B8828F] shadow-lg ribbon-tip z-0">
            </div>

            <!-- El bloque de páginas -->
            <div class="relative flex w-full h-full bg-paper rounded-r-xl shadow-book-pages z-10 overflow-hidden">

                <!-- Lomo interior de la página -->

                    class="w-8 md:w-12 flex-shrink-0 bg-gradient-to-r from-black/20 via-black/5 to-transparent relative z-20">

                <!-- Contenido de la Página -->

                    class="flex-1 relative p-6 md:p-12 flex flex-col items-center justify-center paper-texture border-l border-paper-dark z-10">

                    <!-- Enmarcado Ornamental SVG (Esquinas) -->

                    <svg class="absolute top-4 left-4 w-16 h-16 text-gold/60" viewBox="0 0 100 100" fill="currentColor">

                        <path d="M0,0 L30,0 C30,15 15,30 0,30 L0,0 Z" />

                    </svg>
                    <!-- Esquina Superior Derecha -->
                    <svg class="absolute top-4 right-4 w-16 h-16 text-gold/60 transform rotate-90" viewBox="0 0 100 100"
                        fill="currentColor">
                        <path d="M0,0 L50,0 C50,20 30,30 30,50 C30,70 50,80 50,100 L0,100 L0,0 Z" opacity="0.3" />
                        <path d="M0,0 L30,0 C30,15 15,30 0,30 L0,0 Z" />
                        <circle cx="15" cy="15" r="3" fill="#D4AF37" />
                    </svg>
                    <!-- Esquina Inferior Izquierda -->
                    <svg class="absolute bottom-4 left-4 w-16 h-16 text-gold/60 transform -rotate-90"
                        viewBox="0 0 100 100" fill="currentColor">
                        <path d="M0,0 L50,0 C50,20 30,30 30,50 C30,70 50,80 50,100 L0,100 L0,0 Z" opacity="0.3" />
                        <path d="M0,0 L30,0 C30,15 15,30 0,30 L0,0 Z" />
                        <circle cx="15" cy="15" r="3" fill="#D4AF37" />
                    </svg>
                    <!-- Esquina Inferior Derecha -->
                    <svg class="absolute bottom-4 right-4 w-16 h-16 text-gold/60 transform rotate-180"
                        viewBox="0 0 100 100" fill="currentColor">
                        <path d="M0,0 L50,0 C50,20 30,30 30,50 C30,70 50,80 50,100 L0,100 L0,0 Z" opacity="0.3" />
                        <path d="M0,0 L30,0 C30,15 15,30 0,30 L0,0 Z" />
                        <circle cx="15" cy="15" r="3" fill="#D4AF37" />
                    </svg>

                    <div class="absolute inset-[24px] border border-gold/30 pointer-events-none rounded-sm"></div>

                    <!-- Mapa del Tesoro de Fondo -->
                    <div
                        class="absolute inset-0 z-0 opacity-[0.25] pointer-events-none overflow-hidden rounded-r-xl mix-blend-multiply">
                        <svg class="w-full h-full" viewBox="0 0 500 800" preserveAspectRatio="xMidYMid slice"
                            fill="none" stroke="currentColor">
                            <path d="M-50,100 C 50,120 80,50 150,80 C 200,100 250,20 350,50 C 450,80 550,20 600,100"
                                stroke="#B8828F" stroke-width="1.5" stroke-dasharray="8 6" />
                            <path
                                d="M-50,700 C 100,680 150,750 250,720 C 350,690 400,780 500,750 C 550,730 600,780 650,720"
                                stroke="#B8828F" stroke-width="1.5" stroke-dasharray="8 6" />
                            <path d="M 400,150 C 420,140 450,160 440,180 C 420,190 390,170 400,150 Z" stroke="#B8828F"
                                stroke-width="1" />
                            <path d="M 80,600 C 90,580 120,600 110,620 C 90,630 70,610 80,600 Z" stroke="#B8828F"
                                stroke-width="1" />

                            <g transform="translate(420, 130) scale(0.6)" stroke="#B8828F" stroke-width="1.5">
                                <circle cx="0" cy="0" r="30" fill="none" />
                                <path d="M0,-40 L10,-10 L40,0 L10,10 L0,40 L-10,10 L-40,0 L-10,-10 Z" fill="#B8828F"
                                    fill-opacity="0.2" />
                                <text x="-6" y="-48" font-family="serif" font-size="16" fill="#B8828F"
                                    stroke="none">N</text>
                            </g>

                            <path d="M 250,220 Q 380,300 280,450 T 150,600 Q 100,700 250,720" stroke="#D49BAF"
                                stroke-width="2.5" stroke-dasharray="6 6" fill="none" />

                            <g transform="translate(250, 720) scale(1.3)" stroke="#D49BAF" stroke-width="2">
                                <path d="M-8,-8 L8,8 M8,-8 L-8,8" />
                                <path d="M0,12 C0,12 -6,5 -6,2 C-6,-1 -3,-3 0,-1 C3,-3 6,-1 6,2 C6,5 0,12 0,12 Z"
                                    fill="#D49BAF" stroke="none" transform="translate(0, 12)" />
                            </g>
                        </svg>
                    </div>

                    <div class="mb-2 relative z-30 fade-in delay-1">
                        <svg class="w-24 h-24 text-gold drop-shadow-md mx-auto" viewBox="0 0 64 64" fill="none"
                            stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M 4 54 Q 12 50 20 54 T 36 54 T 52 54 T 60 50" stroke="#B8828F" />
                            <path d="M 8 58 Q 16 54 24 58 T 40 58 T 56 58" stroke="#B8828F" opacity="0.5" />
                            <path
                                d="M 10 50 L 6 36 C 6 36 20 40 32 40 C 44 40 58 36 58 36 L 54 50 C 50 54 40 56 32 56 C 24 56 14 54 10 50 Z"
                                fill="#B8828F" fill-opacity="0.15" />
                            <line x1="22" y1="38" x2="22" y2="10" />
                            <line x1="42" y1="38" x2="42" y2="16" />
                            <path d="M 22 12 Q 36 20 22 34" fill="#B8828F" fill-opacity="0.3" />
                            <path d="M 22 12 Q 10 20 22 34" fill="#B8828F" fill-opacity="0.3" />
                            <path d="M 42 18 Q 52 24 42 34" fill="#B8828F" fill-opacity="0.3" />
                            <path d="M 42 18 Q 34 24 42 34" fill="#B8828F" fill-opacity="0.3" />
                            <polygon points="22,10 32,13 22,16" fill="currentColor" />
                            <polygon points="42,16 50,18 42,20" fill="currentColor" />
                        </svg>
                    </div>

                    <div class="text-center mb-6 relative z-30 fade-in delay-1">
                        <div class="mb-2">
                            <span
                                class="font-serif-title text-gold-dark tracking-[0.2em] text-xs md:text-sm uppercase font-bold">Bitácora
                                de Viaje</span>
                        </div>
                        <h1
                            class="font-serif-title text-4xl md:text-5xl text-ink font-bold tracking-tight mb-2 leading-tight">
                            Las coordenadas
                        </h1>
                        <h2 class="font-script text-4xl md:text-5xl text-cover-red transform -rotate-3 -mt-2">
                            de un amor que perdí
                        </h2>
                    </div>

                    <div class="w-full max-w-[250px] mb-8 text-gold fade-in delay-2 flex justify-center">
                        <svg viewBox="0 0 200 20" class="w-full h-auto drop-shadow-sm" fill="currentColor">
                            <path d="M0,10 Q50,0 100,10 T200,10" fill="none" stroke="currentColor" stroke-width="1" />

                            <circle cx="85" cy="10" r="2" />
                            <circle cx="115" cy="10" r="2" />
                            <polygon points="100,2 103,10 100,18 97,10" fill="currentColor" />
                        </svg>
                    </div>

                    <div class="w-full max-w-lg text-center space-y-4 fade-in delay-2 relative z-30">
                        <p id="welcome-title" class="font-script text-3xl text-ink" data-text="Bienvenida, Angie."></p>
                        <p id="welcome-msg"
                            class="font-body text-ink text-sm md:text-[15px] leading-relaxed text-justify px-4 md:px-2"
                            data-text="Más que un sitio, esta es nuestra historia. A partir de ahora realizaremos un recorrido por los capítulos que marcaron nuestro viaje desde el primer día. Al programar, pensar en cada detalle y escribir cada palabra, volví a navegar por nuestros mejores recuerdos; mi mayor deseo con este presente es que al leerlos, tú también puedas reencontrar el amor y las razones que nos hicieron coincidir.">
                        </p>
                    </div>

                    <div class="mt-8 mb-10 w-full max-w-lg px-8 py-5 relative fade-in delay-3">
                        <div class="absolute inset-0 bg-gold/5 border-y border-gold/40 skew-x-[-2deg]"></div>
                        <p
                            class="font-body text-ink/80 text-sm md:text-base leading-relaxed text-center italic relative z-10 font-medium">
                            "Hay historias que son demasiadas valiosas para dejarlas inconclusas. Reconozco que en el
                            camino
                            perdí mis coordenadas y esta es mi manera más honesta y sincera de encontrarlas de vuelta."
                        </p>
                    </div>

                    <button id="btn-continuar" onclick="iniciarViaje()"
                        class="group relative px-10 py-4 bg-gradient-to-b from-cover-red-deep to-cover-red text-white font-serif-title tracking-[0.2em] text-sm md:text-base uppercase rounded-lg shadow-xl border border-white/20 transition-all duration-300 hover:scale-105 hover:brightness-110 active:scale-95">
                        <span class="absolute inset-0 border border-white/10 rounded-lg pointer-events-none m-1"></span>
                        <span class="relative z-10 flex items-center justify-center gap-3">

                                 fill="none" stroke="currentColor" viewBox="0 0 24 24">

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const titleElement = document.getElementById('welcome-title');
            const msgElement = document.getElementById('welcome-msg');
            const btnContinuar = document.getElementById('btn-continuar');

            function typeWriter(element, text, speed, callback) {
                let i = 0;
                element.classList.add('typewriter-cursor');

                function type() {
                    if (i < text.length) {
                        element.innerHTML += text.charAt(i);
                        i++;
                        // Pausa un poco más en comas y puntos para naturalidad
                        let currentSpeed = speed;
                        if (text.charAt(i - 1) === ',' || text.charAt(i - 1) === '.') {
                            currentSpeed = speed * 4;
                        }
                        setTimeout(type, currentSpeed);
                    } else {
                        element.classList.remove('typewriter-cursor');
                        element.classList.add('typewriter-done');
                        if (callback) callback();
                    }
                }
                type();
            }

            // Iniciar secuencia de escritura después de un breve delay
            setTimeout(() => {
                const titleText = titleElement.getAttribute('data-text');
                typeWriter(titleElement, titleText, 100, () => {
                    const msgText = msgElement.getAttribute('data-text');
                    typeWriter(msgElement, msgText, 35, () => {
                        // Mostrar botón al finalizar
                        btnContinuar.classList.add('show');
                    });
                });
            }, 2000); // Esperar a que la animación de entrada del libro progrese
        });

        function iniciarViaje() {
            const libro = document.querySelector('.max-w-2xl');

            // Animación de abrir el libro
            libro.style.transition = 'all 1.5s cubic-bezier(0.4, 0, 0.2, 1)';
            libro.style.transform = 'scale(1.1) translateX(-20px) rotateY(-20deg)';
            libro.style.opacity = '0';
            libro.style.filter = 'blur(10px)';

            setTimeout(() => {
                window.location.href = 'home.html';
            }, 1500);
        }
    </script>
</body>

</html>
